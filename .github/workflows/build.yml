name: Build PHP

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force build a specific version (e.g., 8.4.3). Leave empty for auto-detect."
        required: false
        default: ""

permissions:
  contents: write

env:
  REPO: ${{ github.repository }}

jobs:
  check:
    name: Check for updates
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has_builds: ${{ steps.check.outputs.has_builds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Check for new versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ github.event.inputs.force_version }}" ]]; then
            VERSION="${{ github.event.inputs.force_version }}"
            echo "Forced build for PHP ${VERSION}"

            PLATFORMS=$(yq -o=json '.platforms' config.yaml)
            MATRIX='{"include":[]}'

            while IFS= read -r platform; do
              os=$(echo "$platform" | jq -r '.os')
              arch=$(echo "$platform" | jq -r '.arch')
              MATRIX=$(echo "$MATRIX" | jq \
                --arg version "$VERSION" \
                --arg os "$os" \
                --arg arch "$arch" \
                '.include += [{"version": $version, "os": $os, "arch": $arch}]')
            done < <(echo "$PLATFORMS" | jq -c '.[]')

            echo "matrix=$(echo "$MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESULTS=$(bash scripts/check-updates.sh)
          echo "$RESULTS"

          PLATFORMS=$(yq -o=json '.platforms' config.yaml)
          MATRIX='{"include":[]}'
          HAS_BUILDS=false

          while IFS= read -r line; do
            action=$(echo "$line" | awk '{print $1}')
            version=$(echo "$line" | awk '{print $2}')

            if [[ "$action" == "BUILD" ]]; then
              HAS_BUILDS=true
              while IFS= read -r platform; do
                os=$(echo "$platform" | jq -r '.os')
                arch=$(echo "$platform" | jq -r '.arch')
                MATRIX=$(echo "$MATRIX" | jq \
                  --arg version "$version" \
                  --arg os "$os" \
                  --arg arch "$arch" \
                  '.include += [{"version": $version, "os": $os, "arch": $arch}]')
              done < <(echo "$PLATFORMS" | jq -c '.[]')
            fi
          done <<< "$RESULTS"

          echo "matrix=$(echo "$MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "has_builds=${HAS_BUILDS}" >> "$GITHUB_OUTPUT"

          if [[ "$HAS_BUILDS" == "true" ]]; then
            echo "New versions to build:"
            echo "$MATRIX" | jq '.include[] | "\(.version) \(.os)-\(.arch)"'
          else
            echo "No new versions to build."
          fi

  build:
    name: Build PHP ${{ matrix.version }} (${{ matrix.os }}-${{ matrix.arch }})
    needs: check
    if: needs.check.outputs.has_builds == 'true'
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config cmake \
            re2c bison curl wget git xz-utils \
            libxml2-dev libssl-dev libsqlite3-dev zlib1g-dev libbz2-dev \
            libcurl4-openssl-dev libpng-dev libjpeg-dev libfreetype-dev \
            libonig-dev libzip-dev libgmp-dev libreadline-dev libsodium-dev \
            libxslt-dev libpq-dev

          YQ_ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${YQ_ARCH}"
          sudo chmod +x /usr/local/bin/yq

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build PHP ${{ matrix.version }}
        run: |
          chmod +x scripts/build-php.sh
          bash scripts/build-php.sh "${{ matrix.version }}" "${{ matrix.os }}" "${{ matrix.arch }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-${{ matrix.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: output/php-${{ matrix.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 1

  publish:
    name: Publish releases
    needs: [check, build]
    if: needs.check.outputs.has_builds == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create PHP releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MATRIX='${{ needs.check.outputs.matrix }}'
          VERSIONS=$(echo "$MATRIX" | jq -r '.include[].version' | sort -u)

          for version in $VERSIONS; do
            TAG="php-${version}"
            echo "=== Publishing PHP ${version} ==="

            ASSETS=()
            for artifact_dir in artifacts/php-${version}-*/; do
              for tarball in "${artifact_dir}"php-*.tar.gz; do
                if [[ -f "$tarball" ]]; then
                  ASSETS+=("$tarball")
                  echo "  Asset: $(basename "$tarball")"
                fi
              done
            done

            if [[ ${#ASSETS[@]} -eq 0 ]]; then
              echo "Warning: No assets found for PHP ${version}, skipping release"
              continue
            fi

            NOTES="PHP ${version} — static CLI + FrankenPHP (Linux x86_64 + aarch64)"

            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              gh release upload "$TAG" "${ASSETS[@]}" --repo "$REPO" --clobber
            else
              gh release create "$TAG" \
                "${ASSETS[@]}" \
                --repo "$REPO" \
                --title "PHP ${version}" \
                --notes "$NOTES" \
                --latest=false
            fi
          done

      - name: Update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-manifest.sh
          bash scripts/update-manifest.sh
